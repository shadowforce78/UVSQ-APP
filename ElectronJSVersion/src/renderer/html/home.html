<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <!-- https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'">
    <title>Page Principale</title>
    <link rel="stylesheet" href="../css/home.css">
</head>

<body>
    <div class="theme-toggle">
        <label class="switch">
            <input type="checkbox" id="themeToggle">
            <span class="slider round"></span>
        </label>
        <span class="toggle-label">Mode sombre</span>
    </div>
    <div class="main">
        <h1 class="title">Bienvenue <span class="prenom"></span> !</h1>
        <!-- Menu EDT/NOTES/ABSCENCES -->
        <div class="menu">
            <button class="btn" id="edt">Emploi du temps</button>
            <button class="btn" id="notes">Notes</button>
            <button class="btn" id="absences">Absences</button>
        </div>
        <button class="btn btn-logout" id="logout">Déconnexion</button>
    </div>

    <script type="module" src="../js/home.js"></script>
</body>

</html>
